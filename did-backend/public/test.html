<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset= "UTF-8">
    <title>DID Login Test Page</title>
</head>
<body>
    <h1>DID Login Test</h1>
    <label>
      website URL:
      <input id = "websiteUrlInput" type = "text" placeholder="https://example.com">
      </label>
      <button id = "createchallengeBtn">Create challenge</button>
      <h2>Challenge response</h2>
      <pre id="challengeOutput">(nothing yet)</pre>
      <script>
        //Get reference to the HTML elements so we can use them in JS
        const websiteUrlInput = document.getElementById('websiteUrlInput');
    // the text box
        const createchallengeBtn = document.getElementById('createchallengeBtn');  //the button
        const challengeOutput = document.getElementById('challengeOutput');

        //the pre box
        
           // For now, just log them to check
           console.log('websiteUrlInput:', websiteUrlInput);
           console.log('createChallengeBtn:',createchallengeBtn)
           console.log('challengeOutput:', challengeOutput);

           // when the user clicks the 'create challenge' button...
           createchallengeBtn.addEventListener('click',() =>{
            //read the value from the input box
            const websiteUrl = websiteUrlInput.value;

            //show something immediately in the output box
            challengeOutput.textContent = 'sending request...';

            //call our backend: POST http://localhost:3000/api/challenge
            fetch('http://localhost:3000/api/challenge', {
                method: 'POST',
                headers:{
                    'Content-Type': 'application/json',       //tell server body is JSON [web:39]
                },
                body: JSON.stringify({websiteUrl:websiteUrl})   //send {"websiteurl":"..."}
            })
                .then(response => response.json())      //parse json from response

               .then(data => {
                //show the json nicely inside <pre>
                challengeOutput.textContent = JSON.stringify(data, null, 2);
                console.log('Challenge response:', data);
               })
               .catch(error => {
                // if something fails (server down, CORS, etc.)
                console.error('Error calling /api/challenge:',error);
                challengeOutput.textContent = 'Error:' + error;
                
               });
               
            });
      </script>
</body>
</html>
